[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Redirect API endpoints to Netlify Serverless Function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA Fallback for React router / client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
